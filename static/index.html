<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SeatLight · 首尔演唱会座位视角</title>
  <style>
    :root {
      --primary: #5FD4B8; --primary-dark: #4ABFA3; --primary-light: #E8F8F5;
      --white: #FFFFFF; --bg: #F7FAFA;
      --text-primary: #2C3E50; --text-secondary: #5A6C7D; --text-muted: #95A5A6;
      --border: #E1E8ED; --shadow: 0 2px 12px rgba(0,0,0,0.06); --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg); color: var(--text-primary); min-height: 100vh; line-height: 1.6;
    }
    .app-container { max-width: 480px; margin: 0 auto; padding: 0 0 80px; position: relative; }

    /* ===== 图片查看器（lightbox） ===== */
    .lightbox-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 9999; display: none; touch-action: none;
      -webkit-user-select: none; user-select: none;
    }
    .lightbox-overlay.active { display: block; animation: lbFadeIn .2s ease; }
    @keyframes lbFadeIn { from { opacity: 0 } to { opacity: 1 } }
    .lightbox-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
      z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,.6), transparent);
      padding-top: calc(env(safe-area-inset-top, 0px) + 12px);
    }
    .lightbox-caption { color: #fff; font-size: 13px; font-weight: 500; flex: 1; text-align: center; }
    .lightbox-counter { color: rgba(255,255,255,.8); font-size: 12px; padding: 0 12px; min-width: 40px; }
    .lightbox-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.15); border: none; color: #fff;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .lightbox-btn svg { width: 20px; height: 20px; fill: #fff; }
    .lightbox-btn-close svg { width: 18px; height: 18px; }
    .lightbox-stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .lightbox-img-wrap {
      position: relative; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      transform-origin: center center;
      will-change: transform;
    }
    .lightbox-img-wrap img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; pointer-events: none;
      -webkit-user-drag: none; user-drag: none;
    }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.15); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none; color: #fff; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 5; transition: opacity .2s;
    }
    .lightbox-nav.prev { left: 12px; }
    .lightbox-nav.next { right: 12px; }
    .lightbox-nav:disabled { opacity: .3; cursor: default; }
    .lightbox-hint {
      position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.7); font-size: 12px;
      background: rgba(0,0,0,.4); padding: 4px 12px; border-radius: 12px;
      pointer-events: none; transition: opacity .4s;
    }
    .lightbox-zoom-info {
      position: absolute; bottom: calc(env(safe-area-inset-bottom, 0px) + 60px);
      left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 12px; background: rgba(0,0,0,.5);
      padding: 2px 10px; border-radius: 10px;
      pointer-events: none; opacity: 0; transition: opacity .25s;
    }
    .lightbox-zoom-info.show { opacity: 1; }

    /* ===== 座位图/视角图片点击态 ===== */
    #seatmapContainer img, #viewImage img { cursor: zoom-in; }

    /* ===== 顶部品牌区 ===== */
    .top-bar { background: var(--white); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo { width: 34px; height: 34px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .brand-logo svg { width: 20px; height: 20px; fill: white; }
    .brand-text { font-size: 1.05rem; font-weight: 700; color: var(--text-primary); }
    .brand-subtitle { font-size: 0.7rem; color: var(--text-muted); margin-top: 1px; }

    /* ===== Banner 轮播 ===== */
    .banner-carousel { position: relative; width: 100%; height: 200px; overflow: hidden; background: var(--primary-light); }
    .banner-slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 0.6s ease-in-out; background-size: cover; background-position: center; }
    .banner-slide.active { opacity: 1; }
    .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.5)); display: flex; flex-direction: column; justify-content: flex-end; padding: 24px; color: white; }
    .banner-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .banner-desc { font-size: 0.82rem; opacity: 0.95; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .banner-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
    .banner-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.3s; }
    .banner-dot.active { width: 18px; border-radius: 3px; background: white; }

    /* ===== Tabs ===== */
    .tabs { display: flex; background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .tab { flex: 1; padding: 14px; text-align: center; font-size: 0.92rem; font-weight: 500; color: var(--text-secondary); cursor: pointer; border: none; background: none; position: relative; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .tab.active { color: var(--primary-dark); font-weight: 600; }
    .tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: var(--primary); border-radius: 2px; }
    .tab .btn-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .tab-content { display: none; padding: 20px 16px; }
    .tab-content.active { display: block; }

    /* ===== 卡片 ===== */
    .card { background: var(--white); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text-primary); }
    .card-icon { width: 20px; height: 20px; fill: var(--primary); flex-shrink: 0; }

    /* ===== 表单 ===== */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: var(--text-secondary); }
    .form-label .required { color: #e74c3c; font-weight: 700; margin-left: 2px; }
    .form-input { width: 100%; padding: 12px 16px; font-size: 0.95rem; border: 1.5px solid var(--border); border-radius: 8px; background: var(--white); color: var(--text-primary); transition: all 0.2s; font-family: inherit; }
    .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    /* ===== 可搜索下拉框 ===== */
    .searchable-wrap { position: relative; }
    .searchable-dropdown { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--white); border: 1.5px solid var(--border); border-radius: 8px; max-height: 300px; overflow-y: auto; z-index: 50; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .searchable-dropdown.show { display: block; }
    .dropdown-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .dropdown-item:hover { background: var(--primary-light); }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item-title { font-weight: 600; margin-bottom: 2px; }
    .dropdown-item-meta { font-size: 0.75rem; color: var(--text-muted); }

    /* ===== 场馆信息卡片 ===== */
    .venue-info-card { background: linear-gradient(135deg, var(--primary-light), var(--white)); border: 1.5px solid var(--primary); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .venue-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
    .venue-poster { width: 80px; height: 80px; border-radius: 8px; background: var(--white); border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .venue-poster img { width: 100%; height: 100%; object-fit: cover; }
    .venue-details { flex: 1; }
    .venue-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
    .venue-meta { display: flex; flex-direction: column; gap: 4px; font-size: 0.82rem; color: var(--text-secondary); }
    .venue-meta-item { display: flex; align-items: center; gap: 6px; }
    .venue-meta-icon { width: 14px; height: 14px; fill: var(--primary); flex-shrink: 0; }
    .seatmap-section { margin-top: 16px; }
    .seatmap-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
    .seatmap-container { background: var(--white); border: 1.5px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
    .seatmap-container img { max-width: 100%; height: auto; border-radius: 6px; }
    .seatmap-placeholder { padding: 40px 20px; color: var(--text-muted); font-size: 0.85rem; }

    /* ===== 视角卡片 ===== */
    .view-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
    .view-image { width: 100%; height: 240px; background: var(--primary-light); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .view-image img { width: 100%; height: 100%; object-fit: cover; }
    .view-image-placeholder { color: var(--text-muted); font-size: 0.9rem; }
    .view-content { padding: 16px; }
    .view-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tag { display: inline-block; padding: 4px 12px; font-size: 0.75rem; background: var(--primary-light); color: var(--primary-dark); border-radius: 4px; font-weight: 500; }
    .tag.active-tag { background: var(--primary); color: white; }
    .view-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }
    .view-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; }

    /* ===== 按钮 ===== */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; font-size: 0.95rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; width: 100%; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(95, 212, 184, 0.3); }
    .btn-secondary { background: var(--white); color: var(--text-secondary); border: 1.5px solid var(--border); }
    .btn-icon { width: 18px; height: 18px; fill: currentColor; }

    /* ===== 上传进度 ===== */
    .upload-progress { display: none; margin-top: 16px; }
    .upload-progress.show { display: block; }
    .progress-bar { width: 100%; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); border-radius: 4px; transition: width 0.3s ease; width: 0%; }
    .progress-text { font-size: 0.82rem; color: var(--text-secondary); text-align: center; }

    /* ===== 文件选择器 ===== */
    .file-selector { border: 2px dashed var(--border); border-radius: 8px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--white); position: relative; }
    .file-selector:hover { border-color: var(--primary); background: var(--primary-light); }
    .file-selector.has-file { border-style: solid; border-color: var(--primary); padding: 12px; }
    .file-selector-icon { width: 48px; height: 48px; fill: var(--text-muted); margin-bottom: 12px; }
    .file-selector.has-file .file-selector-icon { display: none; }
    .file-selector-text { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; }
    .file-selector-hint { font-size: 0.75rem; color: var(--text-muted); }
    .file-selector.has-file .file-selector-text, .file-selector.has-file .file-selector-hint { display: none; }
    .file-preview { display: none; position: relative; }
    .file-selector.has-file .file-preview { display: block; }
    .file-preview img { max-width: 100%; max-height: 200px; border-radius: 6px; }
    .file-preview-remove { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .file-preview-remove svg { width: 16px; height: 16px; fill: white; }
    .file-preview-grid { display: none; gap: 8px; flex-wrap: wrap; }
    .file-selector.has-file .file-preview-grid { display: flex; }
    .file-preview-grid .preview-item { position: relative; flex: 1; min-width: 0; }
    .file-preview-grid .preview-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; }
    .file-preview-grid .preview-remove { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .file-preview-grid .preview-remove svg { width: 14px; height: 14px; fill: white; }
    .file-counter { font-size: 0.75rem; color: var(--primary); margin-top: 6px; display: none; }
    .file-selector.has-file .file-counter { display: block; }

    /* ===== 底部导航 ===== */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--white); border-top: 1px solid var(--border); display: flex; z-index: 100; padding: 8px 0 env(safe-area-inset-bottom, 8px); }
    .nav-item { flex: 1; text-align: center; padding: 8px 4px; cursor: pointer; color: var(--text-muted); transition: color 0.2s; }
    .nav-item.active { color: var(--primary); }
    .nav-icon { width: 22px; height: 22px; fill: currentColor; margin-bottom: 2px; }
    .nav-label { font-size: 0.72rem; font-weight: 500; }

    /* ===== Toast ===== */
    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: rgba(44, 62, 80, 0.9); color: white; padding: 14px 28px; border-radius: 8px; font-size: 0.9rem; z-index: 9999; opacity: 0; transition: all 0.25s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* ===== Loading ===== */
    .loading { text-align: center; padding: 32px; color: var(--text-muted); }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 邀请码弹窗 ===== */
    .invite-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .invite-overlay.hidden { display: none; }
    .invite-modal { background: var(--white); border-radius: var(--radius); padding: 32px 28px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .invite-modal h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .invite-modal p { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
    .invite-modal .form-input { text-align: center; font-size: 1rem; letter-spacing: 0.1em; margin-bottom: 16px; }
    .invite-modal .btn { width: 100%; }
    .invite-error { color: #e74c3c; font-size: 0.82rem; margin-top: 10px; display: none; }
  </style>
</head>
<body>

<!-- 邀请码弹窗（默认隐藏） -->
<div class="invite-overlay hidden" id="inviteOverlay">
  <div class="invite-modal">
    <svg style="width:48px;height:48px;fill:var(--primary);margin-bottom:16px"><use href="#icon-key"></use></svg>
    <h3>请输入邀请码</h3>
    <p>当前为试点阶段，请输入邀请码后继续使用 SeatLight</p>
    <input class="form-input" id="inviteCode" placeholder="请输入邀请码" autocomplete="off">
    <button class="btn btn-primary" onclick="checkInviteCode()">验证</button>
    <div class="invite-error" id="inviteError">邀请码错误，请重试</div>
  </div>
</div>

<div class="app-container">
  <!-- 顶部品牌区 -->
  <div class="top-bar">
    <div class="brand">
      <div class="brand-logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18l7 3.5v7.64l-7 3.5-7-3.5V7.68l7-3.5z"/></svg></div>
      <div><div class="brand-text">SeatLight</div><div class="brand-subtitle">首尔演唱会座位视角</div></div>
    </div>
  </div>

  <!-- Banner 轮播（内嵌图片） -->
  <div class="banner-carousel" id="bannerCarousel"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="search">
      <svg class="btn-icon"><use href="#icon-search"></use></svg>
      <span>查视角</span>
    </button>
    <button class="tab" data-tab="upload">
      <svg class="btn-icon"><use href="#icon-upload"></use></svg>
      <span>传视角</span>
    </button>
  </div>

  <!-- 查视角 Tab -->
  <div class="tab-content active" id="tab-search">
    <!-- 筛选条件 -->
    <div class="card">
      <div class="card-title"><svg class="card-icon"><use href="#icon-filter"></use></svg>筛选视角</div>
      
      <div class="form-group">
        <label class="form-label">场馆 <span class="required">*</span></label>
        <div class="searchable-wrap">
          <input class="form-input" id="venueInput" placeholder="请选择场馆" autocomplete="off" readonly>
          <input type="hidden" id="venue">
          <div class="searchable-dropdown" id="venueDropdown"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">区域</label>
        <input class="form-input" id="filterZone" placeholder="如：1区" autocomplete="off">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">排</label>
          <input class="form-input" id="filterRow" placeholder="如：10" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label">座位号</label>
          <input class="form-input" id="filterSeat" placeholder="如：4" autocomplete="off">
        </div>
      </div>

      <div class="form-row">
        <button class="btn btn-primary" style="flex:1" onclick="applyFilter()">
          <svg class="btn-icon"><use href="#icon-search"></use></svg>查询
        </button>
        <button class="btn btn-secondary" style="flex:1" onclick="resetFilter()">
          <svg class="btn-icon"><use href="#icon-reset"></use></svg>重置
        </button>
      </div>
    </div>

    <!-- 场馆信息（选中后显示） -->
    <div id="venueInfoSection" style="display:none">
      <div class="venue-info-card">
        <div class="venue-header">
          <div class="venue-poster" id="venuePosterWrap" style="display:none"><img id="venuePoster" src="" alt=""></div>
          <div class="venue-details">
            <div class="venue-name" id="venueName"></div>
            <div class="venue-meta">
              <div class="venue-meta-item"><svg class="venue-meta-icon"><use href="#icon-location"></use></svg><span id="venueCity"></span></div>
              <div class="venue-meta-item"><svg class="venue-meta-icon"><use href="#icon-capacity"></use></svg><span id="venueCapacity"></span></div>
              <div class="venue-meta-item"><svg class="venue-meta-icon"><use href="#icon-type"></use></svg><span id="venueType"></span></div>
              <div class="venue-meta-item" id="venueArrivalWrap" style="display:none"><svg class="venue-meta-icon"><use href="#icon-transport"></use></svg><span id="venueArrival"></span></div>
            </div>
          </div>
        </div>
        <div class="seatmap-section">
          <div class="seatmap-title"><svg class="btn-icon"><use href="#icon-seatmap"></use></svg>座位图</div>
          <div class="seatmap-container" id="seatmapContainer"><div class="seatmap-placeholder">座位图暂缺</div></div>
        </div>
      </div>
    </div>

    <!-- 视角结果 -->
    <div id="viewResultSection" style="display:none">
      <div class="card">
        <div class="card-title"><svg class="card-icon"><use href="#icon-view"></use></svg>座位视角</div>
        <div class="view-card" id="viewCard">
          <div class="view-image" id="viewImage"><div class="view-image-placeholder">暂无视角图</div></div>
          <div class="view-content">
            <div class="view-tags" id="viewTags"></div>
            <div class="view-desc" id="viewDesc"></div>
            <div class="view-meta" id="viewMeta"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 传视角 Tab -->
  <div class="tab-content" id="tab-upload">
    <div class="card">
      <div class="card-title"><svg class="card-icon"><use href="#icon-upload"></use></svg>上传视角图</div>

      <div class="form-group">

<script>

// ===== Banner 数据（内嵌图片） =====

  { name: '演唱会', imgUrl: 'img/banner/banner1.jpg' },

// ===== 邀请码检查 =====
(function checkInvite() {
  if (localStorage.getItem(INVITE_VERIFIED_KEY) === '1' && inviteCode) return;
  document.getElementById('inviteOverlay').classList.remove('hidden');
  document.getElementById('inviteCode').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkInviteCode();
  });
})();

function checkInviteCode() {
  var code = document.getElementById('inviteCode').value.trim();
  var errorEl = document.getElementById('inviteError');
  var btn = document.querySelector('.invite-modal .btn');
  if (!code) { errorEl.textContent = '请输入邀请码'; errorEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '验证中...'; errorEl.style.display = 'none';
  fetch('/api/invite/check', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code: code }) })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.ok) {
        localStorage.setItem(INVITE_VERIFIED_KEY, '1');
        localStorage.setItem(INVITE_CODE_KEY, code);
        inviteCode = code;
        document.getElementById('inviteOverlay').classList.add('hidden');
        loadInitialData();
      } else { errorEl.textContent = '邀请码错误，请重试'; errorEl.style.display = 'block'; }
    })
    .catch(function() { errorEl.textContent = '网络错误，请重试'; errorEl.style.display = 'block'; })
    .finally(function() { btn.disabled = false; btn.textContent = '验证'; });
}

function getHeaders() { return { 'Content-Type': 'application/json', 'X-Invite-Code': inviteCode }; }

// ===== Tab 切换 =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab[data-tab="' + tab + '"]').forEach(function(t) { t.classList.add('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });

}

// ===== Toast =====
function showToast(msg) {

// ===== 加载初始数据 =====
function loadInitialData() {

  loadVenueData();
}

// ===== Banner 从飞书表格加载（无需邀请码，5s 超时回退本地） =====
function loadBannerFromApi() {
  fetch('/api/banner/list', {
    signal: AbortSignal.timeout(5000)
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.records && data.records.length > 0) {
        bannerSlides = data.records.map(function(rec) {
          var f = rec.fields;
          var imgToken = (f['图片'] && f['图片'][0]) ? f['图片'][0].file_token : '';
          return {
            name: f['演出名称'] || '',
            time: f['演出时间'] || '',
            location: f['演出地点'] || '',
            imgUrl: imgToken ? '/img/' + imgToken : ''
          };
        }).filter(function(s) { return s.imgUrl; });
        if (bannerSlides.length > 0) {
          currentSlideIndex = 0;
          renderBanner();
        }
      }
    })
    .catch(function() { /* 超时或失败，保留本地 fallback */ });
}

// ===== Banner 轮播（内嵌图片） =====
var bannerInterval = null;
function renderBanner() {
  var carousel = document.getElementById('bannerCarousel');

  if (bannerInterval) { clearInterval(bannerInterval); bannerInterval = null; }
  currentSlideIndex = 0;

  if (bannerSlides.length === 0) {
    carousel.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted)">暂无Banner数据</div>';
    return;
  }

  var slidesHtml = bannerSlides.map(function(s, i) {
    var bgStyle = 'background-image:url(' + s.imgUrl + ')';
    return '<div class="banner-slide ' + (i === 0 ? 'active' : '') + '" style="' + bgStyle + '"><div class="banner-overlay"><div class="banner-title">' + escapeHtml(s.name) + '</div><div class="banner-desc">' + escapeHtml(s.time) + ' · ' + escapeHtml(s.location) + '</div></div></div>';
  }).join('');

  var dotsHtml = bannerSlides.map(function(_, i) {
    return '<div class="banner-dot ' + (i === 0 ? 'active' : '') + '" onclick="goToSlide(' + i + ')"></div>';
  }).join('');

  carousel.innerHTML = slidesHtml + '<div class="banner-dots" id="bannerDots">' + dotsHtml + '</div>';

  // 触摸滑动只绑定一次
  if (!carousel.dataset.swipeBound) {
    setupTouchSwipe(carousel);
    carousel.dataset.swipeBound = '1';
  }

  if (bannerSlides.length > 1) {
    bannerInterval = setInterval(function() { goToSlide((currentSlideIndex + 1) % bannerSlides.length); }, 4000);
  }
}

// 触摸/鼠标滑动处理
function setupTouchSwipe(element) {
  var startX = 0;
  var startY = 0;
  var isTouching = false;
  var isTouchEvent = false; // 标记是否通过触摸设备交互

  // 触摸事件
  element.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isTouching = true;
    isTouchEvent = true; // 标记为触摸设备
  }, { passive: true });

  element.addEventListener('touchend', function(e) {
    if (!isTouching) return;
    isTouching = false;
    handleSwipe(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }, { passive: true });

  // 鼠标拖拽事件（桌面端）—— 触摸设备上跳过，避免合成事件导致重复切换
  element.addEventListener('mousedown', function(e) {
    if (isTouchEvent) return; // 触摸设备不处理鼠标事件
    startX = e.clientX;
    startY = e.clientY;
    isTouching = true;
  });

  element.addEventListener('mouseup', function(e) {
    if (isTouchEvent) return; // 触摸设备不处理鼠标事件
    if (!isTouching) return;
    isTouching = false;
    handleSwipe(e.clientX, e.clientY);
  });

  element.addEventListener('mouseleave', function() {
    isTouching = false;
  });

  function handleSwipe(endX, endY) {
    var diffX = endX - startX;
    var diffY = endY - startY;

    // 只有水平滑动距离大于垂直距离且大于 30px 时才切换
    if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 30) {
      if (diffX < 0) {
        goToSlide((currentSlideIndex + 1) % bannerSlides.length);
      } else {
        goToSlide((currentSlideIndex - 1 + bannerSlides.length) % bannerSlides.length);
      }
      // 重置定时器
      if (bannerInterval) {
        clearInterval(bannerInterval);
        bannerInterval = setInterval(function() { goToSlide((currentSlideIndex + 1) % bannerSlides.length); }, 4000);
      }
    }
  }
}

function goToSlide(index) {
  var slides = document.querySelectorAll('.banner-slide');
  var dots = document.querySelectorAll('.banner-dot');
  if (slides.length === 0) return;
  slides[currentSlideIndex].classList.remove('active');
  if (dots[currentSlideIndex]) dots[currentSlideIndex].classList.remove('active');
  currentSlideIndex = index;
  slides[currentSlideIndex].classList.add('active');
  if (dots[currentSlideIndex]) dots[currentSlideIndex].classList.add('active');
}

// ===== 场馆数据 =====
function loadVenueData() {
  fetch('/api/venues/list', { headers: getHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      venues = (data.records || []).map(function(rec) {
        var f = rec.fields || {};
        var imgs = f['座位图'] || [];
        var seatmapToken = imgs.length > 0 ? (imgs[0].file_token || '') : '';
        return {
          id: rec.record_id || '',
          name: f['场馆'] || '',
          city: f['所在城市'] || '',
          capacity: f['容量'] || '',
          type: f['类型'] || '',
          arrival: f['交通'] || '',
          seatmap: seatmapToken ? '/img/' + seatmapToken : ''
        };
      });
      console.log('[Venue] 加载场馆:', venues.length, '个');
      setupVenueDropdown('venueInput', 'venueDropdown', 'venue');
      setupVenueDropdown('upVenueInput', 'upVenueDropdown', 'upVenue');
      renderVenueDropdown('venueDropdown', venues);
      renderVenueDropdown('upVenueDropdown', venues);
    })
    .catch(function() { console.warn('[Venue] 加载失败'); });
}

// ===== 场馆下拉（简洁版，不依赖 cloneNode）=====
function setupVenueDropdown(inputId, dropdownId, hiddenId, onSelect) {
  var input = document.getElementById(inputId);
  var dropdown = document.getElementById(dropdownId);

  if (!input || !dropdown) return;

  input.addEventListener('click', function(e) {
    e.stopPropagation();
    // 关闭其他下拉框
    document.querySelectorAll('.searchable-dropdown').forEach(function(d) {
      if (d !== dropdown) d.classList.remove('show');
    });
    dropdown.classList.toggle('show');
  });

  input.addEventListener('focus', function(e) {
    e.stopPropagation();
  });
}

// 全局点击关闭下拉框
document.addEventListener('click', function(e) {
  if (!e.target.closest('.searchable-wrap')) {
    document.querySelectorAll('.searchable-dropdown').forEach(function(d) {
      d.classList.remove('show');
    });
  }
});

function renderVenueDropdown(dropdownId, venues) {
  var dropdown = document.getElementById(dropdownId);
  if (!dropdown) return;
  dropdown.innerHTML = venues.map(function(v) {
    return '<div class="dropdown-item" data-vid="' + v.id + '"><div class="dropdown-item-title">' + escapeHtml(v.name) + '</div><div class="dropdown-item-meta">' + escapeHtml(v.city) + ' · ' + escapeHtml(v.capacity) + '</div></div>';
  }).join('');

  // 用事件委托绑定点击
  dropdown.querySelectorAll('.dropdown-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      var venueId = item.getAttribute('data-vid');
      var venue = venues.find(function(v) { return v.id === venueId; });
      if (!venue) return;

      var wrap = dropdown.closest('.searchable-wrap');
      var input = wrap.querySelector('.form-input');
      var hidden = wrap.querySelector('input[type="hidden"]');
      if (input) input.value = venue.name;
      if (hidden) hidden.value = venue.id;
      dropdown.classList.remove('show');

      if (dropdownId === 'venueDropdown') {
        currentVenue = venue;
        showVenueInfo(venue);
      }
    });
  });
}

function renderCarousel() {
  var viewImage = document.getElementById('viewImage');
  var match = carouselMatches[carouselIndex];
  var f = match.fields || {};
  var imgs = f['图片'] || [];

  // 图片内索引越界时重置
  if (carouselImgIndex >= imgs.length) carouselImgIndex = 0;

  var fileToken = imgs.length > 0 ? (imgs[carouselImgIndex].file_token || '') : '';
  var imgUrl = fileToken ? '/img/' + fileToken : '';

  if (imgUrl) {
    var html = '<img src="' + imgUrl + '" alt="视角" onclick="openViewImageLightbox()" onerror="this.parentElement.innerHTML=\'<div class=\'view-image-placeholder\'>图片加载失败</div>\'">';
    // 多条记录间的导航
    if (carouselMatches.length > 1) {
      html += '<button onclick="navigateCarousel(-1)" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);border:1.5px solid var(--border);cursor:pointer;z-index:2">◀</button>';
      html += '<button onclick="navigateCarousel(1)" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.9);border:1.5px solid var(--border);cursor:pointer;z-index:2">▶</button>';
    }
    // 单条记录内多张图片的导航
    if (imgs.length > 1) {
      html += '<button onclick="navigateRecordImg(-1)" style="position:absolute;left:8px;bottom:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;color:#fff;cursor:pointer;z-index:2;font-size:14px">‹</button>';
      html += '<button onclick="navigateRecordImg(1)" style="position:absolute;right:8px;bottom:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;color:#fff;cursor:pointer;z-index:2;font-size:14px">›</button>';
      html += '<div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:#fff;border-radius:10px;padding:2px 8px;font-size:11px;z-index:2">' + (carouselImgIndex + 1) + '/' + imgs.length + '</div>';
    }
    viewImage.style.position = 'relative';
    viewImage.innerHTML = html;
  } else {
    viewImage.innerHTML = '<div class="view-image-placeholder">暂无图片</div>';
  }

  var section = f['区域'] || '';
  var row = f['排/座位号'] || '';
  var desc = f['视角描述'] || '';
  var uploadTime = f['上传时间'] || '';

  document.getElementById('viewTags').innerHTML = '<span class="tag active-tag">' + escapeHtml(currentVenue ? currentVenue.name : '') + '</span><span class="tag">' + escapeHtml(section) + '</span>' + (row ? '<span class="tag">' + escapeHtml(row) + '</span>' : '') + (carouselMatches.length > 1 ? '<span class="tag" style="color:var(--primary)">' + (carouselIndex + 1) + '/' + carouselMatches.length + '</span>' : '');
  document.getElementById('viewDesc').textContent = desc || '暂无描述';
  document.getElementById('viewMeta').textContent = uploadTime;
}

function navigateCarousel(dir) {
  carouselImgIndex = 0;
  carouselIndex = Math.max(0, Math.min(carouselMatches.length - 1, carouselIndex + dir));
  renderCarousel();
}

function navigateRecordImg(dir) {
  var imgs = carouselMatches[carouselIndex].fields['图片'] || [];
  carouselImgIndex = Math.max(0, Math.min(imgs.length - 1, carouselImgIndex + dir));
  renderCarousel();
}

// ===== 文件选择（支持多张，最多 3 张） =====
var MAX_FILES = 3;

// 用 Canvas 强制将图片转换为真正的 JPEG（解决 iPhone HEIF 文件名.jpeg 但内容非 JPEG 的问题）
function imageToJpeg(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        // 限制最大尺寸为 1920px，超大图片才压缩
        var maxW = 1920, maxH = 1920;
        var w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxW || h > maxH) {
          var ratio = Math.min(maxW / w, maxH / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        // 质量 0.85，适中平衡大小和画质
        var jpegDataUrl = canvas.toDataURL('image/jpeg', 0.85);
        var base64 = jpegDataUrl.split(',')[1];
        resolve({
          dataUrl: jpegDataUrl,
          base64: base64,
          fileName: (file.name || 'upload.jpg').replace(/\.(heic|heif)$/i, '.jpg')
        });
      };
      img.onerror = function() { reject(new Error('无法加载图片')); };
      img.src = e.target.result;
    };
    reader.onerror = function() { reject(new Error('读取文件失败')); };
    reader.readAsDataURL(file);
  });
}

function handleFileSelect(event) {
  var newFiles = Array.from(event.target.files);
  if (newFiles.length === 0) return;

  // 合并到现有文件，限制最多 MAX_FILES 张
  var remaining = MAX_FILES - selectedFiles.length;
  if (remaining <= 0) {
    showToast('最多只能上传 ' + MAX_FILES + ' 张图片');
    event.target.value = '';
    return;
  }
  var toAdd = newFiles.slice(0, remaining);
  if (newFiles.length > remaining) {
    showToast('最多 ' + MAX_FILES + ' 张，已自动截取前 ' + remaining + ' 张');
  }

  // 逐张转换（统一转为真实 JPEG，兼容 iPhone HEIF）
  var pending = toAdd.length;
  toAdd.forEach(function(file) {
    imageToJpeg(file).then(function(result) {
      selectedFiles.push({
        file: { name: result.fileName },
        dataUrl: result.dataUrl,
        base64: result.base64
      });
      pending--;
      if (pending === 0) renderFilePreview();
    }).catch(function(err) {
      showToast('图片转换失败: ' + err.message);
      pending--;
      if (pending === 0) renderFilePreview();
    });
  });

  // 清空 input 以便可以重复选择相同文件
  event.target.value = '';
}

function renderFilePreview() {
  var grid = document.getElementById('filePreviewGrid');
  var counter = document.getElementById('fileCounter');
  var selector = document.getElementById('fileSelector');

  if (selectedFiles.length === 0) {
    grid.innerHTML = '';
    counter.textContent = '';
    selector.classList.remove('has-file');
    return;
  }

  selector.classList.add('has-file');
  counter.textContent = '已选择 ' + selectedFiles.length + '/' + MAX_FILES + ' 张';

  grid.innerHTML = selectedFiles.map(function(item, idx) {
    return '<div class="preview-item">' +
      '<img src="' + item.dataUrl + '" alt="预览">' +
      '<div class="preview-remove" onclick="removeFile(event, ' + idx + ')">' +
      '<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>' +
      '</div></div>';
  }).join('');
}

function removeFile(event, idx) {
  event.stopPropagation();
  selectedFiles.splice(idx, 1);
  renderFilePreview();
}

// ===== 上传 =====
async function doUpload() {
  var venue = document.getElementById('upVenueInput').value; // 显示 input 存的是场馆名
  var area = document.getElementById('upArea').value.trim();
  var row = document.getElementById('upRow').value.trim();
  var seat = document.getElementById('upSeat').value.trim();
  var desc = document.getElementById('upDesc').value.trim();

  if (!venue) { showToast('请选择场馆'); return; }
  if (!area) { showToast('请填写区域'); return; }
  if (selectedFiles.length === 0) { showToast('请选择图片'); return; }

  var btn = document.getElementById('upBtn');
  var progress = document.getElementById('uploadProgress');
  var fill = document.getElementById('progressFill');
  var text = document.getElementById('progressText');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px"></span>上传中...';
  progress.classList.add('show');
  fill.style.width = '0%';

  var simulateProgress = setInterval(function() {
    var current = parseFloat(fill.style.width) || 0;
    if (current < 90) { fill.style.width = (current + Math.random() * 15) + '%'; }
  }, 300);

  try {
    // 1. 多图并行上传，收集所有 file_token
    var fileTokens = [];
    text.textContent = '上传 ' + selectedFiles.length + ' 张图片中...';
    var uploadPromises = [];
    for (var i = 0; i < selectedFiles.length; i++) {
      var uploadItem = selectedFiles[i];
      uploadPromises.push(
        fetch('/api/upload', {
          method: 'POST', headers: getHeaders(), body: JSON.stringify({ image: uploadItem.dataUrl, fileName: uploadItem.file.name || 'upload.jpg' })
        }).then(function(r) { return r.json(); })
      );
    }
    var results = await Promise.all(uploadPromises);
    for (var j = 0; j < results.length; j++) {
      if (results[j].error) throw new Error('上传失败: ' + results[j].error);
      if (results[j].fileToken) fileTokens.push({ file_token: results[j].fileToken });
    }

    fill.style.width = '70%';
    text.textContent = '创建记录...';

    // 2. 创建记录（直接用上传页 hidden input 的场馆名，不依赖 currentVenue）
    var venueName = venue;
    var recordData = {
      fields: {
        '场馆': venueName,
        '区域': area,
        '排/座位号': row ? (row + '排' + (seat ? seat + '号' : '')) : (seat ? seat + '号' : ''),
        '视角描述': desc || '用户上传的演唱会现场视角',
        '艺人': '',
        '图片': fileTokens,
        '上传时间': new Date().toISOString().split('T')[0],
      }
    };

    var recordRes = await fetch('/api/records', { method: 'POST', headers: getHeaders(), body: JSON.stringify(recordData) });
    var recordResult = await recordRes.json();
    if (recordResult.error) throw new Error(recordResult.error);

    fill.style.width = '100%';
    text.textContent = '提交成功！';

    setTimeout(function() {
      btn.disabled = false;
      btn.innerHTML = '<svg class="btn-icon"><use href="#icon-upload"></use></svg>上传视角';
      progress.classList.remove('show');
      fill.style.width = '0%';
      document.getElementById('upArea').value = '';
      document.getElementById('upRow').value = '';
      document.getElementById('upSeat').value = '';
      document.getElementById('upDesc').value = '';
      document.getElementById('upVenue').value = '';
      document.getElementById('upVenueInput').value = '';
      selectedFiles = [];
      renderFilePreview();
      showToast('提交成功，等待管理员审核后展示');
    }, 1500);

  } catch (err) {
    clearInterval(simulateProgress);
    text.textContent = '上传失败: ' + err.message;
    setTimeout(function() {
      btn.disabled = false;
      btn.innerHTML = '<svg class="btn-icon"><use href="#icon-upload"></use></svg>上传视角';
      progress.classList.remove('show');
      fill.style.width = '0%';
    }, 2000);
  }
}

// ===== 工具函数 =====
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== 应用筛选 =====
function applyFilter() {
  var zone = document.getElementById('filterZone').value;
  var row = document.getElementById('filterRow').value.trim();
  var seat = document.getElementById('filterSeat').value.trim();

  if (!currentVenue) {
    showToast('请先选择场馆');
    return;
  }

  var section = document.getElementById('viewResultSection');
  section.style.display = 'block';
  var viewImage = document.getElementById('viewImage');
  viewImage.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  fetch('/api/records', { headers: getHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var records = data.records || [];
      var matches = records.filter(function(rec) {
        var f = rec.fields || {};
        var venueField = f['场馆'] || '';
        if (currentVenue && venueField.indexOf(currentVenue.name) === -1) return false;

        if (zone) {
          var zoneField = f['区域'] || '';
          // 支持输入 "6", "6区", "W6", "W6区" 等多种格式，都匹配
          var zoneNum = zone.replace(/[^\w]/g, '').toUpperCase(); // "W6" 或 "6"
          var zoneFieldMatch = zoneField.match(/([A-Za-z]*\d+)/); // 提取字母+数字部分，如 "W6"
          var zoneFieldCode = zoneFieldMatch ? zoneFieldMatch[1].toUpperCase() : '';
          // 比较：如果用户输入纯数字，只比较数字部分；如果有字母，比较完整编码
          if (zoneNum.match(/^\d+$/)) {
            // 纯数字输入，比较数字部分
            var zoneFieldNum = zoneFieldCode.match(/\d+/);
            if (!zoneFieldNum || zoneFieldNum[0] !== zoneNum) return false;
          } else {
            // 有字母输入，比较完整编码
            if (zoneFieldCode !== zoneNum) return false;
          }
        }

        if (row || seat) {
          var rowSeat = f['排/座位号'] || '';
          if (row && rowSeat.indexOf(row + '排') === -1) return false;
          if (seat && rowSeat.indexOf(seat + '号') === -1) return false;
        }

        return true;
      });

      if (matches.length > 0) {
        carouselMatches = matches;
        carouselIndex = 0;
        renderCarousel();
      } else {
        viewImage.innerHTML = '<div class="view-image-placeholder">未找到匹配的视角</div>';
        var tags = [];
        tags.push('<span class="tag">' + escapeHtml(currentVenue.name) + '</span>');
        if (zone) tags.push('<span class="tag">' + zone + '区</span>');
        if (row) tags.push('<span class="tag">' + escapeHtml(row) + '排</span>');
        if (seat) tags.push('<span class="tag">' + escapeHtml(seat) + '号</span>');
        document.getElementById('viewTags').innerHTML = tags.join('');
        document.getElementById('viewDesc').textContent = '未找到匹配的视角';
        document.getElementById('viewMeta').textContent = '';
      }
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
}

  document.getElementById('venue').value = '';

  document.getElementById('filterRow').value = '';
  document.getElementById('filterSeat').value = '';

// ===== 图片查看器（lightbox） =====
var lbOverlay = null;
var lbImages = [];        // 当前图片列表（file_token 数组）
var lbIndex = 0;          // 当前显示索引
var lbCaption = '';       // 标题文字
var lbScale = 1;          // 当前缩放比例
var lbTranslateX = 0;     // 水平位移
var lbTranslateY = 0;     // 垂直位移
var lbIsDragging = false; // 是否正在拖拽
var lbStartX = 0, lbStartY = 0;
var lbLastX = 0, lbLastY = 0;
var lbPinchStartDist = 0;
var lbPinchStartScale = 1;
var lbPinchStartTx = 0, lbPinchStartTy = 0;
var lbPinchFocalX = 0, lbPinchFocalY = 0; // 双指中心点相对容器中心
var lbDoubleTapTimer = null;
var lbLastTapTime = 0;
var lbZoomInfoTimer = null;

function openLightbox(images, startIndex, caption) {
  lbImages = images || [];
  if (lbImages.length === 0) return;
  lbIndex = startIndex || 0;
  lbCaption = caption || '';
  renderLightbox();
  lbOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lbOverlay.classList.remove('active');
  document.body.style.overflow = '';
  lbScale = 1; lbTranslateX = 0; lbTranslateY = 0;
}

function renderLightbox() {
  var img = lbImages[lbIndex];
  var src = img.url || (img.file_token ? '/img/' + img.file_token : '');
  var stage = lbOverlay.querySelector('.lightbox-img-wrap');
  stage.innerHTML = '<img src="' + src + '" alt="图片" draggable="false">';
  // 重置变换
  lbScale = 1; lbTranslateX = 0; lbTranslateY = 0;
  applyTransform();
  // 更新 UI
  lbOverlay.querySelector('.lightbox-caption').textContent = lbCaption;
  var counter = lbOverlay.querySelector('.lightbox-counter');
  if (lbImages.length > 1) {
    counter.textContent = (lbIndex + 1) + ' / ' + lbImages.length;
    counter.style.display = '';
  } else {
    counter.style.display = 'none';
  }
  // 导航按钮
  var prevBtn = lbOverlay.querySelector('.lightbox-nav.prev');
  var nextBtn = lbOverlay.querySelector('.lightbox-nav.next');
  prevBtn.style.display = lbImages.length > 1 ? '' : 'none';
  nextBtn.style.display = lbImages.length > 1 ? '' : 'none';
  prevBtn.disabled = lbIndex === 0;
  nextBtn.disabled = lbIndex === lbImages.length - 1;
  // 提示动画
  var hint = lbOverlay.querySelector('.lightbox-hint');
  if (hint) {
    hint.style.opacity = '1';
    setTimeout(function() { hint.style.opacity = '0'; }, 2000);
  }
}

function applyTransform() {
  var stage = lbOverlay.querySelector('.lightbox-img-wrap');
  if (stage) {
    stage.style.transform = 'translate(' + lbTranslateX + 'px, ' + lbTranslateY + 'px) scale(' + lbScale + ')';
  }
}

function showZoomInfo() {
  var info = lbOverlay.querySelector('.lightbox-zoom-info');
  info.textContent = Math.round(lbScale * 100) + '%';
  info.classList.add('show');
  clearTimeout(lbZoomInfoTimer);
  lbZoomInfoTimer = setTimeout(function() { info.classList.remove('show'); }, 800);
}

function navigateLightbox(dir) {
  var newIdx = lbIndex + dir;
  if (newIdx < 0 || newIdx >= lbImages.length) return;
  lbIndex = newIdx;
  renderLightbox();
}

function initLightboxDOM() {
  if (document.getElementById('lightboxOverlay')) return;
  var html = '<div class="lightbox-overlay" id="lightboxOverlay">' +
    '<div class="lightbox-header">' +
      '<button class="lightbox-btn lightbox-btn-close" id="lbClose" aria-label="关闭"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>' +
      '<div class="lightbox-caption" id="lbCaption"></div>' +
      '<div class="lightbox-counter" id="lbCounter"></div>' +
    '</div>' +
    '<div class="lightbox-stage" id="lbStage">' +
      '<div class="lightbox-img-wrap" id="lbImgWrap"></div>' +
    '</div>' +
    '<button class="lightbox-nav prev" id="lbPrev">‹</button>' +
    '<button class="lightbox-nav next" id="lbNext">›</button>' +
    '<div class="lightbox-hint" id="lbHint">双击放大 · 双指缩放</div>' +
    '<div class="lightbox-zoom-info" id="lbZoomInfo"></div>' +
  '</div>';
  document.body.insertAdjacentHTML('beforeend', html);
  lbOverlay = document.getElementById('lightboxOverlay');

  // 事件绑定
  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', function(e) { e.stopPropagation(); navigateLightbox(-1); });
  document.getElementById('lbNext').addEventListener('click', function(e) { e.stopPropagation(); navigateLightbox(1); });

  // 点击空白关闭（但仅在未缩放时）
  document.getElementById('lbStage').addEventListener('click', function(e) {
    if (lbScale <= 1 && e.target.tagName !== 'IMG') closeLightbox();
  });

  // 触摸手势
  var stage = document.getElementById('lbStage');
  stage.addEventListener('touchstart', handleTouchStart, { passive: false });
  stage.addEventListener('touchmove', handleTouchMove, { passive: false });
  stage.addEventListener('touchend', handleTouchEnd, { passive: false });

  // 鼠标滚轮缩放（桌面端）
  stage.addEventListener('wheel', handleWheel, { passive: false });
}

// 触摸开始
function handleTouchStart(e) {
  if (e.touches.length === 2) {
    // 双指缩放开始
    e.preventDefault();
    lbPinchStartDist = getDistance(e.touches[0], e.touches[1]);
    lbPinchStartScale = lbScale;
    lbPinchStartTx = lbTranslateX;
    lbPinchStartTy = lbTranslateY;
    // 记录初始焦点点（双指中心点相对容器中心的偏移）
    var stage = document.getElementById('lbStage');
    var rect = stage.getBoundingClientRect();
    var centerX = rect.left + rect.width / 2;
    var centerY = rect.top + rect.height / 2;
    var midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    var midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    lbPinchFocalX = midX - centerX - lbTranslateX;
    lbPinchFocalY = midY - centerY - lbTranslateY;
  } else if (e.touches.length === 1) {
    // 单指拖拽 或 双击检测
    var now = Date.now();
    if (now - lbLastTapTime < 300) {
      // 双击：切换缩放
      e.preventDefault();
      handleDoubleTap(e.touches[0].clientX, e.touches[0].clientY);
      lbLastTapTime = 0;
    } else {
      lbLastTapTime = now;
      lbIsDragging = true;
      lbStartX = e.touches[0].clientX - lbTranslateX;
      lbStartY = e.touches[0].clientY - lbTranslateY;
      lbLastX = lbTranslateX;
      lbLastY = lbTranslateY;
    }
  }
}

// 触摸移动
function handleTouchMove(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    var dist = getDistance(e.touches[0], e.touches[1]);
    var newScale = Math.max(1, Math.min(5, lbPinchStartScale * (dist / lbPinchStartDist)));
    // 围绕焦点缩放：保持焦点位置不变
    var ratio = newScale / lbPinchStartScale;
    lbTranslateX = lbPinchFocalX * (1 - ratio) + lbPinchStartTx * ratio;
    lbTranslateY = lbPinchFocalY * (1 - ratio) + lbPinchStartTy * ratio;
    lbScale = newScale;
    applyTransform();
    showZoomInfo();
  } else if (e.touches.length === 1 && lbIsDragging && lbScale > 1) {
    e.preventDefault();
    lbTranslateX = e.touches[0].clientX - lbStartX;
    lbTranslateY = e.touches[0].clientY - lbStartY;
    applyTransform();
  }
}

// 触摸结束
function handleTouchEnd(e) {
  lbIsDragging = false;
  // 边界回弹：缩放到1时重置位移
  if (lbScale <= 1.05) {
    lbScale = 1; lbTranslateX = 0; lbTranslateY = 0;
    applyTransform();
  }
  // 滑动切换（仅在未缩放时）
  if (lbScale === 1 && e.changedTouches.length === 1) {
    var dx = e.changedTouches[0].clientX - lbStartX;
    var dy = e.changedTouches[0].clientY - lbStartY;
    if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0) navigateLightbox(1);
      else navigateLightbox(-1);
    }
  }
}

// 鼠标滚轮缩放
function handleWheel(e) {
  e.preventDefault();
  var stage = document.getElementById('lbStage');
  var rect = stage.getBoundingClientRect();
  var centerX = rect.width / 2;
  var centerY = rect.height / 2;
  var focalX = e.clientX - rect.left - centerX - lbTranslateX;
  var focalY = e.clientY - rect.top - centerY - lbTranslateY;
  var delta = e.deltaY > 0 ? 0.9 : 1.1;
  var newScale = Math.max(1, Math.min(5, lbScale * delta));
  var ratio = newScale / lbScale;
  lbTranslateX = focalX * (1 - ratio) + lbTranslateX * ratio;
  lbTranslateY = focalY * (1 - ratio) + lbTranslateY * ratio;
  lbScale = newScale;
  if (lbScale === 1) { lbTranslateX = 0; lbTranslateY = 0; }
  applyTransform();
  showZoomInfo();
}

// 双击切换缩放
function handleDoubleTap(x, y) {
  if (lbScale > 1) {
    lbScale = 1; lbTranslateX = 0; lbTranslateY = 0;
  } else {
    lbScale = 2.5;
    // 以点击位置为中心缩放
    var rect = lbOverlay.getBoundingClientRect();
    var centerX = rect.width / 2;
    var centerY = rect.height / 2;
    lbTranslateX = (centerX - x) * 1.5;
    lbTranslateY = (centerY - y) * 1.5;
  }
  applyTransform();
  showZoomInfo();
}

// 计算两点距离
function getDistance(t1, t2) {
  var dx = t1.clientX - t2.clientX;
  var dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// 座位图点击放大
function openSeatmapLightbox() {
  var img = document.querySelector('#seatmapContainer img');
  if (!img) return;
  openLightbox([{ url: img.src, file_token: '' }], 0, '座位图');
}

// 视角图点击放大
function openViewImageLightbox() {
  var imgs = carouselMatches[carouselIndex] ? (carouselMatches[carouselIndex].fields['图片'] || []) : [];
  if (imgs.length === 0) return;
  var images = imgs.map(function(f) { return { file_token: f.file_token }; });
  var caption = (currentVenue ? currentVenue.name : '') + ' · ' + (carouselMatches[carouselIndex].fields['区域'] || '');
  openLightbox(images, carouselImgIndex, caption);
}

// 初始化 DOM
initLightboxDOM();

// ===== 初始化 =====
// 立即渲染本地 Banner fallback
renderBanner();
// 页面加载后自动尝试从飞书表格加载 Banner（5s 超时回退本地）
loadBannerFromApi();

// 如果邀请码已验证，加载场馆数据
if (localStorage.getItem(INVITE_VERIFIED_KEY) === '1' && inviteCode) {
  loadVenueData();
}
</script>
