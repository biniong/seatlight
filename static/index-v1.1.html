<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SeatLight · 首尔演唱会座位视角</title>
  <style>
    :root {
      --primary: #5FD4B8;
      --primary-dark: #4ABFA3;
      --primary-light: #E8F8F5;
      --white: #FFFFFF;
      --bg: #F7FAFA;
      --text-primary: #2C3E50;
      --text-secondary: #5A6C7D;
      --text-muted: #95A5A6;
      --border: #E1E8ED;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 12px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    .app-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 80px;
      position: relative;
    }
    
    /* ===== 顶部品牌区 ===== */
    .top-bar {
      background: var(--white);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .brand-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .brand-logo svg {
      width: 24px;
      height: 24px;
      fill: white;
    }
    
    .brand-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .brand-subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    
    /* ===== Banner 轮播 ===== */
    .banner-carousel {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
      background: var(--primary-light);
    }
    
    .banner-slide {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
    }
    
    .banner-slide.active {
      opacity: 1;
    }
    
    .banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.4));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px;
      color: white;
    }
    
    .banner-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    
    .banner-desc {
      font-size: 0.85rem;
      opacity: 0.95;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    
    .banner-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    
    .banner-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .banner-dot.active {
      width: 20px;
      border-radius: 3px;
      background: white;
    }
    
    /* ===== Tabs ===== */
    .tabs {
      display: flex;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border: none;
      background: none;
      position: relative;
      transition: all 0.2s;
    }
    
    .tab.active {
      color: var(--primary-dark);
      font-weight: 600;
    }
    
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
    }
    
    .tab-content {
      display: none;
      padding: 20px 16px;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* ===== 卡片 ===== */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }
    
    .card-icon {
      width: 20px;
      height: 20px;
      fill: var(--primary);
    }
    
    /* ===== 表单 ===== */
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }
    
    .form-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      color: var(--text-primary);
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    
    .form-row {
      display: flex;
      gap: 12px;
    }
    
    .form-row .form-group {
      flex: 1;
    }
    
    /* ===== 可搜索下拉框 ===== */
    .searchable-wrap {
      position: relative;
    }
    
    .searchable-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    
    .searchable-dropdown.show {
      display: block;
    }
    
    .dropdown-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    
    .dropdown-item:hover {
      background: var(--primary-light);
    }
    
    .dropdown-item:last-child {
      border-bottom: none;
    }
    
    .dropdown-item-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .dropdown-item-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    /* ===== 场馆信息卡片 ===== */
    .venue-info-card {
      background: linear-gradient(135deg, var(--primary-light), var(--white));
      border: 1.5px solid var(--primary);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .venue-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .venue-poster {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      background: var(--white);
      border: 2px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    
    .venue-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .venue-details {
      flex: 1;
    }
    
    .venue-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    
    .venue-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    
    .venue-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .venue-meta-icon {
      width: 14px;
      height: 14px;
      fill: var(--primary);
    }
    
    .seatmap-section {
      margin-top: 16px;
    }
    
    .seatmap-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .seatmap-container {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    
    .seatmap-container img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }
    
    .seatmap-placeholder {
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    
    /* ===== 区域选择网格 ===== */
    .zone-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 16px;
    }
    
    .zone-chip {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      font-weight: 600;
    }
    
    .zone-chip:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    
    .zone-chip.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }
    
    .zone-count {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    .zone-chip.active .zone-count {
      color: rgba(255,255,255,0.9);
    }
    
    /* ===== 视角卡片 ===== */
    .view-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    
    .view-image {
      width: 100%;
      height: 240px;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    .view-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .view-image-placeholder {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    
    .view-content {
      padding: 16px;
    }
    
    .view-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    
    .tag {
      display: inline-block;
      padding: 4px 12px;
      font-size: 0.75rem;
      background: var(--primary-light);
      color: var(--primary-dark);
      border-radius: 4px;
      font-weight: 500;
    }
    
    .view-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .view-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 8px;
    }
    
    /* ===== 按钮 ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
      width: 100%;
    }
    
    .btn-primary:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(95, 212, 184, 0.3);
    }
    
    .btn-secondary {
      background: var(--white);
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }
    
    .btn-icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    
    /* ===== 上传进度 ===== */
    .upload-progress {
      display: none;
      margin-top: 16px;
    }
    
    .upload-progress.show {
      display: block;
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }
    
    .progress-text {
      font-size: 0.82rem;
      color: var(--text-secondary);
      text-align: center;
    }
    
    /* ===== 文件选择器 ===== */
    .file-selector {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--white);
    }
    
    .file-selector:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    
    .file-selector.has-file {
      border-style: solid;
      border-color: var(--primary);
      padding: 12px;
    }
    
    .file-selector-icon {
      width: 48px;
      height: 48px;
      fill: var(--text-muted);
      margin-bottom: 12px;
    }
    
    .file-selector.has-file .file-selector-icon {
      display: none;
    }
    
    .file-selector-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    
    .file-selector-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .file-preview {
      display: none;
      position: relative;
    }
    
    .file-selector.has-file .file-preview {
      display: block;
    }
    
    .file-preview img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 6px;
    }
    
    .file-preview-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .file-preview-remove:hover {
      background: rgba(0,0,0,0.7);
    }
    
    .file-preview-remove svg {
      width: 16px;
      height: 16px;
      fill: white;
    }
    
    /* ===== 底部导航 ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
      padding: 8px 0 env(safe-area-inset-bottom, 8px);
    }
    
    .nav-item {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    
    .nav-item.active {
      color: var(--primary);
    }
    
    .nav-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
      margin-bottom: 4px;
    }
    
    .nav-label {
      font-size: 0.72rem;
      font-weight: 500;
    }
    
    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(44, 62, 80, 0.9);
      color: white;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 9999;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
    }
    
    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    
    /* ===== 空状态 ===== */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    
    .empty-state-icon {
      width: 64px;
      height: 64px;
      fill: var(--border);
      margin-bottom: 16px;
    }
    
    .empty-state-text {
      font-size: 0.9rem;
    }
    
    /* ===== Loading ===== */
    .loading {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
    }
    
    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- 顶部品牌区 -->
  <div class="top-bar">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18l7 3.5v7.64l-7 3.5-7-3.5V7.68l7-3.5z"/></svg>
      </div>
      <div>
        <div class="brand-text">SeatLight</div>
        <div class="brand-subtitle">首尔演唱会座位视角</div>
      </div>
    </div>
  </div>
  
  <!-- Banner 轮播 -->
  <div class="banner-carousel" id="bannerCarousel">
    <div class="banner-slide active" style="background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%)">
      <div class="banner-overlay">
        <div class="banner-title">BTS 首尔回归演唱会</div>
        <div class="banner-desc">2026.03.21 · 光化门广场</div>
      </div>
    </div>
    <div class="banner-slide" style="background-image: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)">
      <div class="banner-overlay">
        <div class="banner-title">IU 2026 演唱会</div>
        <div class="banner-desc">2026.09 · 高阳综合运动场</div>
      </div>
    </div>
    <div class="banner-slide" style="background-image: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)">
      <div class="banner-overlay">
        <div class="banner-title">2PM THE RETURN</div>
        <div class="banner-desc">2026.08.08-09 · 仁川 INSPIRE Arena</div>
      </div>
    </div>
    <div class="banner-dots">
      <div class="banner-dot active" onclick="goToSlide(0)"></div>
      <div class="banner-dot" onclick="goToSlide(1)"></div>
      <div class="banner-dot" onclick="goToSlide(2)"></div>
    </div>
  </div>
  
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="search">
      <svg class="btn-icon" style="margin-right: 6px"><use href="#icon-search"></use></svg>
      查视角
    </button>
    <button class="tab" data-tab="upload">
      <svg class="btn-icon" style="margin-right: 6px"><use href="#icon-upload"></use></svg>
      传视角
    </button>
  </div>
  
  <!-- 查视角 Tab -->
  <div class="tab-content active" id="tab-search">
    <!-- 场馆选择 -->
    <div class="card">
      <div class="card-title">
        <svg class="card-icon"><use href="#icon-venue"></use></svg>
        选择场馆
      </div>
      <div class="searchable-wrap">
        <input class="form-input" id="venueInput" placeholder="请选择场馆" autocomplete="off" readonly>
        <input type="hidden" id="venue">
        <div class="searchable-dropdown" id="venueDropdown"></div>
      </div>
    </div>
    
    <!-- 场馆信息（选中后显示） -->
    <div id="venueInfoSection" style="display:none">
      <div class="venue-info-card">
        <div class="venue-header">
          <div class="venue-poster">
            <img id="venuePoster" src="" alt="场馆海报">
          </div>
          <div class="venue-details">
            <div class="venue-name" id="venueName"></div>
            <div class="venue-meta">
              <div class="venue-meta-item">
                <svg class="venue-meta-icon"><use href="#icon-location"></use></svg>
                <span id="venueCity"></span>
              </div>
              <div class="venue-meta-item">
                <svg class="venue-meta-icon"><use href="#icon-capacity"></use></svg>
                <span id="venueCapacity"></span>
              </div>
              <div class="venue-meta-item">
                <svg class="venue-meta-icon"><use href="#icon-type"></use></svg>
                <span id="venueType"></span>
              </div>
            </div>
          </div>
        </div>
        
        <div class="seatmap-section">
          <div class="seatmap-title">
            <svg class="btn-icon"><use href="#icon-seatmap"></use></svg>
            座位图
          </div>
          <div class="seatmap-container" id="seatmapContainer">
            <div class="seatmap-placeholder">座位图加载中...</div>
          </div>
        </div>
      </div>
      
      <!-- 区域选择 -->
      <div class="card">
        <div class="card-title">
          <svg class="card-icon"><use href="#icon-zone"></use></svg>
          选择区域
        </div>
        <div class="zone-grid" id="zoneGrid"></div>
      </div>
    </div>
    
    <!-- 视角结果 -->
    <div id="viewResultSection" style="display:none">
      <div class="card">
        <div class="card-title">
          <svg class="card-icon"><use href="#icon-view"></use></svg>
          座位视角
        </div>
        <div class="view-card" id="viewCard">
          <div class="view-image" id="viewImage">
            <div class="view-image-placeholder">暂无视角图</div>
          </div>
          <div class="view-content">
            <div class="view-tags" id="viewTags"></div>
            <div class="view-desc" id="viewDesc"></div>
            <div class="view-meta" id="viewMeta"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 空状态 -->
    <div id="emptyState" class="empty-state">
      <svg class="empty-state-icon"><use href="#icon-empty"></use></svg>
      <div class="empty-state-text">请先选择场馆查看视角</div>
    </div>
  </div>
  
  <!-- 传视角 Tab -->
  <div class="tab-content" id="tab-upload">
    <div class="card">
      <div class="card-title">
        <svg class="card-icon"><use href="#icon-upload"></use></svg>
        上传视角图
      </div>
      
      <div class="form-group">
        <label class="form-label">场馆</label>
        <div class="searchable-wrap">
          <input class="form-input" id="upVenueInput" placeholder="请选择场馆" autocomplete="off" readonly>
          <input type="hidden" id="upVenue">
          <div class="searchable-dropdown" id="upVenueDropdown"></div>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">区域 *</label>
        <input class="form-input" id="upArea" placeholder="如：7区、32区">
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">排</label>
          <input class="form-input" id="upRow" placeholder="如：10">
        </div>
        <div class="form-group">
          <label class="form-label">座位号</label>
          <input class="form-input" id="upSeat" placeholder="如：4">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">视角描述</label>
        <textarea class="form-input" id="upDesc" rows="3" placeholder="简单描述视角感受"></textarea>
      </div>
      
      <div class="form-group">
        <label class="form-label">选择图片 *</label>
        <div class="file-selector" id="fileSelector" onclick="document.getElementById('upFile').click()">
          <svg class="file-selector-icon"><use href="#icon-image"></use></svg>
          <div class="file-selector-text">点击选择图片</div>
          <div class="file-selector-hint">支持 JPG、PNG 格式</div>
          <div class="file-preview" id="filePreview">
            <img id="upImg" alt="预览">
            <div class="file-preview-remove" onclick="removeFile(event)">
              <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </div>
          </div>
        </div>
        <input type="file" id="upFile" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
      </div>
      
      <button class="btn btn-primary" id="upBtn" onclick="doUpload()">
        <svg class="btn-icon"><use href="#icon-upload"></use></svg>
        上传视角
      </button>
      
      <div class="upload-progress" id="uploadProgress">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">上传中...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== 场馆数据（演示用） =====
const venues = [
  {
    id: 'kspo-dome',
    name: 'KSPO DOME 奥林匹克体操竞技场',
    short: 'KSPO DOME',
    city: '首尔',
    capacity: '约15,000人',
    type: '室内竞技场',
    poster: '',
    seatmap: '',
    arrival: '地铁5号线奥林匹克公园站',
    zones: [
      { id: '1', name: '1区', count: 12 },
      { id: '2', name: '2区', count: 8 },
      { id: '3', name: '3区', count: 15 },
      { id: '4', name: '4区', count: 10 },
      { id: '5', name: '5区', count: 6 },
      { id: '6', name: '6区', count: 9 },
      { id: '7', name: '7区', count: 14 },
      { id: '8', name: '8区', count: 11 },
      { id: '9', name: '9区', count: 7 },
      { id: '10', name: '10区', count: 13 },
      { id: '11', name: '11区', count: 8 },
      { id: '12', name: '12区', count: 10 }
    ]
  },
  {
    id: 'goyang-stadium',
    name: '高阳综合运动场',
    short: '高阳运动场',
    city: '高阳',
    capacity: '约40,000人',
    type: '室外体育场',
    poster: '',
    seatmap: '',
    arrival: '地铁3号线鼎钵站',
    zones: [
      { id: 'A', name: 'A区', count: 20 },
      { id: 'B', name: 'B区', count: 18 },
      { id: 'C', name: 'C区', count: 22 },
      { id: 'D', name: 'D区', count: 16 }
    ]
  },
  {
    id: 'inspire-arena',
    name: 'INSPIRE Arena',
    short: 'INSPIRE',
    city: '仁川',
    capacity: '约15,000人',
    type: '室内竞技场',
    poster: '',
    seatmap: '',
    arrival: '仁川机场磁浮线INSPIRE站',
    zones: [
      { id: '1', name: '1区', count: 15 },
      { id: '2', name: '2区', count: 12 },
      { id: '3', name: '3区', count: 18 }
    ]
  }
];

let currentVenue = null;
let currentZone = null;
let selectedFile = null;

// ===== Banner 轮播 =====
let currentSlide = 0;
const slides = document.querySelectorAll('.banner-slide');
const dots = document.querySelectorAll('.banner-dot');

function goToSlide(index) {
  slides[currentSlide].classList.remove('active');
  dots[currentSlide].classList.remove('active');
  currentSlide = index;
  slides[currentSlide].classList.add('active');
  dots[currentSlide].classList.add('active');
}

setInterval(() => {
  goToSlide((currentSlide + 1) % slides.length);
}, 4000);

// ===== Tab 切换 =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll(`.tab[data-tab="${tab}"]`).forEach(t => t.classList.add('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll(`.nav-item[data-nav="${tab}"]`).forEach(n => n.classList.add('active'));
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// ===== Toast =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// ===== 场馆下拉 =====
function setupVenueDropdown(inputId, dropdownId, hiddenId, onSelect) {
  const input = document.getElementById(inputId);
  const dropdown = document.getElementById(dropdownId);
  const hidden = document.getElementById(hiddenId);
  
  input.addEventListener('click', (e) => {
    e.stopPropagation();
    renderVenueDropdown(dropdown, hidden, onSelect);
    dropdown.classList.toggle('show');
  });
  
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.searchable-wrap')) {
      dropdown.classList.remove('show');
    }
  });
}

function renderVenueDropdown(dropdown, hidden, onSelect) {
  dropdown.innerHTML = venues.map(v => `
    <div class="dropdown-item" onclick="selectVenue('${v.id}', '${dropdown.id}', '${hidden.id}')">
      <div class="dropdown-item-title">${v.name}</div>
      <div class="dropdown-item-meta">${v.city} · ${v.capacity}</div>
    </div>
  `).join('');
}

function selectVenue(venueId, dropdownId, hiddenId) {
  const venue = venues.find(v => v.id === venueId);
  if (!venue) return;
  
  const dropdown = document.getElementById(dropdownId);
  const hidden = document.getElementById(hiddenId);
  const input = dropdown.previousElementSibling.previousElementSibling;
  
  input.value = venue.name;
  hidden.value = venue.id;
  dropdown.classList.remove('show');
  
  currentVenue = venue;
  
  if (dropdownId === 'venueDropdown') {
    showVenueInfo(venue);
  }
}

// ===== 显示场馆信息 =====
function showVenueInfo(venue) {
  document.getElementById('venueName').textContent = venue.name;
  document.getElementById('venueCity').textContent = venue.city;
  document.getElementById('venueCapacity').textContent = venue.capacity;
  document.getElementById('venueType').textContent = venue.type;
  
  if (venue.poster) {
    document.getElementById('venuePoster').src = venue.poster;
  } else {
    document.getElementById('venuePoster').style.display = 'none';
  }
  
  if (venue.seatmap) {
    document.getElementById('seatmapContainer').innerHTML = `<img src="${venue.seatmap}" alt="座位图">`;
  } else {
    document.getElementById('seatmapContainer').innerHTML = '<div class="seatmap-placeholder">座位图暂缺</div>';
  }
  
  // 渲染区域网格
  const zoneGrid = document.getElementById('zoneGrid');
  zoneGrid.innerHTML = venue.zones.map(z => `
    <div class="zone-chip" onclick="selectZone('${z.id}')">
      <div>${z.name}</div>
      <div class="zone-count">${z.count}条</div>
    </div>
  `).join('');
  
  document.getElementById('venueInfoSection').style.display = 'block';
  document.getElementById('viewResultSection').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';
}

// ===== 选择区域 =====
function selectZone(zoneId) {
  currentZone = zoneId;
  
  document.querySelectorAll('.zone-chip').forEach(c => c.classList.remove('active'));
  event.target.closest('.zone-chip').classList.add('active');
  
  // 模拟显示视角
  showViewResult();
}

// ===== 显示视角结果 =====
function showViewResult() {
  document.getElementById('viewResultSection').style.display = 'block';
  document.getElementById('viewImage').innerHTML = '<div class="view-image-placeholder">视角图加载中...</div>';
  document.getElementById('viewTags').innerHTML = `
    <span class="tag">${currentVenue.name}</span>
    <span class="tag">${currentZone}区</span>
  `;
  document.getElementById('viewDesc').textContent = '这是一个示例视角描述，展示该区域的观看体验。';
  document.getElementById('viewMeta').textContent = '上传时间：2026-06-30';
  
  document.getElementById('viewResultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ===== 文件选择 =====
function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('upImg').src = e.target.result;
    document.getElementById('fileSelector').classList.add('has-file');
  };
  reader.readAsDataURL(file);
}

function removeFile(event) {
  event.stopPropagation();
  selectedFile = null;
  document.getElementById('fileSelector').classList.remove('has-file');
  document.getElementById('upFile').value = '';
}

// ===== 上传 =====
function doUpload() {
  const venue = document.getElementById('upVenue').value;
  const area = document.getElementById('upArea').value.trim();
  const file = selectedFile;
  
  if (!venue) { showToast('请选择场馆'); return; }
  if (!area) { showToast('请填写区域'); return; }
  if (!file) { showToast('请选择图片'); return; }
  
  // 模拟上传进度
  const btn = document.getElementById('upBtn');
  const progress = document.getElementById('uploadProgress');
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  
  btn.disabled = true;
  btn.textContent = '上传中...';
  progress.classList.add('show');
  
  let percent = 0;
  const interval = setInterval(() => {
    percent += Math.random() * 20;
    if (percent >= 100) {
      percent = 100;
      clearInterval(interval);
      fill.style.width = '100%';
      text.textContent = '上传成功！';
      
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = '<svg class="btn-icon"><use href="#icon-upload"></use></svg>上传视角';
        progress.classList.remove('show');
        fill.style.width = '0%';
        
        // 重置表单
        document.getElementById('upArea').value = '';
        document.getElementById('upRow').value = '';
        document.getElementById('upSeat').value = '';
        document.getElementById('upDesc').value = '';
        document.getElementById('upVenue').value = '';
        document.getElementById('upVenueInput').value = '';
        removeFile(new Event('click'));
        
        showToast('视角已提交');
      }, 1500);
    } else {
      fill.style.width = percent + '%';
      text.textContent = `上传中... ${Math.round(percent)}%`;
    }
  }, 200);
}

// ===== 初始化 =====
setupVenueDropdown('venueInput', 'venueDropdown', 'venue', null);
setupVenueDropdown('upVenueInput', 'upVenueDropdown', 'upVenue', null);
</script>
</body>
</html>
