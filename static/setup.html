<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeatLight v1.1 数据初始化</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 16px; color: #2c3e50; }
    h2 { font-size: 1.1rem; margin: 16px 0 8px; color: #2c3e50; }
    .btn { display: inline-block; padding: 12px 24px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; text-decoration: none; }
    .btn-primary { background: #5FD4B8; color: white; }
    .btn-primary:hover { background: #4ABFA3; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { padding: 12px; border-radius: 8px; margin: 12px 0; font-size: 0.9rem; }
    .status-ok { background: #e8f8f5; color: #2c7a6b; border: 1px solid #b2f0e1; }
    .status-err { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6cb; }
    .status-info { background: #e8f0fe; color: #1a5fb4; border: 1px solid #b3d4fc; }
    pre { background: #f8f9fa; padding: 12px; border-radius: 8px; font-size: 0.8rem; overflow-x: auto; white-space: pre-wrap; }
    .hidden { display: none; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e0e0e0; border-top-color: #5FD4B8; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>SeatLight v1.1 数据初始化</h1>
    <p>点击登录后，将自动创建 Banner 表和 Venues 表，并插入初始数据。</p>
    
    <div id="step1">
      <h2>Step 1: 飞书授权登录</h2>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">登录飞书</button>
    </div>
    
    <div id="step2" class="hidden">
      <h2>Step 2: 初始化数据</h2>
      <div id="initStatus"></div>
      <button class="btn btn-primary hidden" id="initBtn" onclick="doInit()">开始初始化</button>
    </div>
    
    <div id="step3" class="hidden">
      <h2>Step 3: 完成</h2>
      <div id="resultStatus"></div>
    </div>
  </div>

  <div class="card hidden" id="logCard">
    <h2>日志</h2>
    <pre id="log"></pre>
  </div>

<script>
const API_BASE = window.location.origin;
const INVITE_CODE = 'seatlight2026';

function log(msg) {
  const logEl = document.getElementById('log');
  logEl.textContent += msg + '\n';
  document.getElementById('logCard').classList.remove('hidden');
  console.log(msg);
}

function setStatus(elId, msg, type) {
  const el = document.getElementById(elId);
  el.className = 'status status-' + type;
  el.textContent = msg;
}

// Step 1: 登录
function doLogin() {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '登录中...';
  
  const redirectUri = API_BASE + '/auth/callback';
  const state = 'setup_v1.1';
  const authUrl = `${API_BASE}/auth/login?redirect_uri=${encodeURIComponent(redirectUri)}&state=${encodeURIComponent(state)}`;
  
  log('跳转到飞书授权: ' + authUrl);
  window.location.href = authUrl;
}

// 检查登录状态
async function checkLogin() {
  try {
    const res = await fetch(API_BASE + '/api/auth/status');
    const data = await res.json();
    log('登录状态: ' + JSON.stringify(data));
    return data.loggedIn;
  } catch (e) {
    log('检查登录失败: ' + e.message);
    return false;
  }
}

// Step 2: 初始化
async function doInit() {
  const btn = document.getElementById('initBtn');
  const statusEl = document.getElementById('initStatus');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>初始化中...';
  setStatus('initStatus', '正在创建表格并插入数据...', 'info');
  
  log('开始初始化...');
  
  // 读取 3 张图片并转为 base64
  const images = [
    { name: 'IU 2026演唱会', time: '2026.09', location: '高阳综合运动场', fileName: 'iu_concert.png', src: 'iu.png' },
    { name: 'BTS WORLD TOUR ARIRANG', time: '2026.04', location: '高阳综合运动场', fileName: 'bts_concert.png', src: 'bts.png' },
    { name: '2PM THE RETURN in INCHEON', time: '2026.08', location: 'INSPIRE Arena', fileName: '2pm_concert.png', src: '2pm.png' }
  ];
  
  const bannerItems = [];
  for (const img of images) {
    try {
      log('加载图片: ' + img.src);
      const blob = await fetch(img.src).then(r => r.blob());
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
      bannerItems.push({ name: img.name, time: img.time, location: img.location, image: base64, fileName: img.fileName });
      log('图片加载成功: ' + img.name + ' (' + Math.round(base64.length / 1024) + 'KB)');
    } catch (e) {
      log('图片加载失败: ' + img.src + ' - ' + e.message);
    }
  }
  
  const venueItems = [
    { name: 'KSPO DOME 奥林匹克体操竞技场', city: '首尔', capacity: '约15,000人', type: '室内竞技场', arrival: '地铁5号线奥林匹克公园站' },
    { name: '高阳综合运动场', city: '高阳', capacity: '约40,000人', type: '室外体育场', arrival: '地铁3号线鼎钵站' },
    { name: 'INSPIRE Arena', city: '仁川', capacity: '约15,000人', type: '室内竞技场', arrival: '仁川机场磁浮线INSPIRE站' }
  ];
  
  const payload = {
    bannerItems,
    venueItems
  };
  
  log('发送初始化请求...');
  
  try {
    const res = await fetch(API_BASE + '/api/setup/v1.1', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Invite-Code': INVITE_CODE
      },
      body: JSON.stringify(payload)
    });
    
    const data = await res.json();
    log('响应: ' + JSON.stringify(data, null, 2));
    
    if (data.ok) {
      setStatus('initStatus', '初始化成功！', 'ok');
      setStatus('resultStatus', 
        '✅ Banner 表 ID: ' + (data.bannerTableId || 'N/A') + '\n' +
        '✅ Venues 表 ID: ' + (data.venuesTableId || 'N/A') + '\n\n' +
        'Banner 记录: ' + (data.bannerItems || []).map(i => i.name + ': ' + (i.ok ? '✅' : '❌')).join(', ') + '\n' +
        'Venues 记录: ' + (data.venueItems || []).map(i => i.name + ': ' + (i.ok ? '✅' : '')).join(', '),
        'ok'
      );
    } else {
      setStatus('initStatus', '初始化失败: ' + (data.error || '未知错误'), 'err');
      setStatus('resultStatus', ' 初始化失败，请查看日志', 'err');
    }
  } catch (e) {
    log('请求失败: ' + e.message);
    setStatus('initStatus', '请求失败: ' + e.message, 'err');
  }
  
  btn.classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
}

// 页面加载时检查
window.addEventListener('DOMContentLoaded', async () => {
  log('页面加载完成');
  
  // 检查是否刚从 OAuth 回调回来
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('login') === 'success') {
    log('OAuth 登录成功回调');
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    document.getElementById('initBtn').classList.remove('hidden');
  } else {
    // 检查是否已登录
    const loggedIn = await checkLogin();
    if (loggedIn) {
      log('已登录，显示初始化按钮');
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
      document.getElementById('initBtn').classList.remove('hidden');
    }
  }
});
</script>
</body>
</html>
