<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SeatLight · 登录</title>
  <style>
    :root {
      --ink: #2c2c2c; --ink-light: #666; --muted: #999;
      --paper: #faf8f0; --card-bg: #fffef9;
      --accent: #e87d5e; --accent-soft: #fce4db;
      --blue: #5e7fbf; --blue-soft: #e4ecfa;
      --border: #d4c9b8;
      --shadow: 0 2px 12px rgba(44,44,44,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'KaiTi', 'STKaiti', '楷体', 'Georgia', 'Noto Serif SC', serif;
      background: var(--paper); color: var(--ink);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background-image:
        radial-gradient(circle at 10% 15%, rgba(232,125,94,0.035) 0%, transparent 50%),
        radial-gradient(circle at 90% 85%, rgba(107,144,128,0.035) 0%, transparent 50%);
    }
    .login-container { max-width: 400px; width: 100%; }
    .card {
      background: var(--card-bg); border: 2px solid var(--border);
      padding: 40px 32px; box-shadow: var(--shadow);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 225px;
      text-align: center;
    }
    .logo-icon { width: 64px; height: 64px; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .subtitle { color: var(--ink-light); font-size: 0.9rem; margin-bottom: 32px; }
    .btn-feishu {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 14px 32px; font-size: 1rem; font-family: inherit; font-weight: 600;
      border: none; border-radius: 30px 12px 30px 12px / 12px 30px 12px 30px;
      cursor: pointer; transition: all 0.15s;
      background: var(--blue); color: #fff;
    }
    .btn-feishu:hover { background: #4a6aa8; transform: translateY(-1px); }
    .btn-feishu:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .feishu-icon { width: 24px; height: 24px; }
    .tip {
      margin-top: 24px; padding: 16px; background: var(--accent-soft);
      border-radius: 12px; font-size: 0.82rem; color: var(--accent);
      line-height: 1.6;
    }
    .error-msg {
      margin-top: 16px; padding: 12px; background: #fee; color: #c33;
      border-radius: 8px; font-size: 0.85rem; display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card">
      <svg class="logo-icon" viewBox="0 0 44 44" fill="none">
        <circle cx="22" cy="22" r="20" fill="#fce4db" stroke="#e87d5e" stroke-width="2"/>
        <path d="M14 28 L22 14 L30 28" stroke="#e87d5e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="22" cy="32" r="2" fill="#e87d5e"/>
      </svg>
      <h1>SeatLight</h1>
      <p class="subtitle">首尔演唱会座位视角查询</p>
      
      <button class="btn-feishu" id="loginBtn" onclick="doLogin()">
        <svg class="feishu-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2 12L8 6L14 12M10 12L16 6L22 12M2 18L8 12L14 18M10 18L16 12L22 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        使用飞书登录
      </button>
      
      <div class="tip">
        💡 使用飞书账号登录后，即可查看和上传座位视角图
      </div>
      
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    // 检查是否已登录
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.loggedIn) {
          // 已登录，跳转到首页
          window.location.href = '/?login=success';
        }
      } catch (e) {
        console.error('检查登录状态失败:', e);
      }
    }
    
    // 检查 URL 参数是否有错误
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    if (error) {
      const errorEl = document.getElementById('errorMsg');
      errorEl.textContent = '登录失败: ' + decodeURIComponent(error);
      errorEl.classList.add('show');
    }
    
    // 执行登录
    function doLogin() {
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '跳转中...';
      // 重定向到后端 OAuth 登录入口
      window.location.href = '/auth/login';
    }
    
    // 页面加载时检查登录状态
    checkAuth();
  </script>
</body>
</html>
